<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đèn Kéo Quân 3D - Tran Phuoc Vinh</title>
    <style>
        body { background: #222; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        
        /* Khung nhìn 3D */
        .stage { width: 300px; height: 300px; perspective: 1000px; }

        /* Khối lập phương */
        .cube {
            width: 100%; height: 100%;
            position: absolute;
            transform-style: preserve-3d;
            transition: transform 1s;
            animation: xoay3D 10s infinite linear;
        }

        /* Khi rê chuột vào thì dừng xoay */
        .cube:hover { animation-play-state: paused; }

        .cube div {
            position: absolute; width: 300px; height: 300px;
            border: 2px solid #ccc; opacity: 0.9;
        }

        .cube img { width: 100%; height: 100%; object-fit: cover; }

        /* Vị trí 6 mặt của khối lập phương */
        .face1 { transform: translateZ(150px); }
        .face2 { transform: rotateY(90px) translateZ(150px); }
        .face3 { transform: rotateY(180px) translateZ(150px); }
        .face4 { transform: rotateY(-90px) translateZ(150px); }
        .face5 { transform: rotateX(90px) translateZ(150px); }
        .face6 { transform: rotateX(-90px) translateZ(150px); }

        @keyframes xoay3D {
            from { transform: rotateY(0deg) rotateX(0deg); }
            to { transform: rotateY(360deg) rotateX(360deg); }
        }

        .back-link { margin-top: 50px; color: yellow; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Hiệu ứng Đèn Kéo Quân 3D</h1>
    <p>Rê chuột vào khối để dừng xoay</p>

    <div class="stage">
        <div class="cube" id="cube">
            <div class="face1"><img src="images/img1.jpg"></div>
            <div class="face2"><img src="images/img2.jpg"></div>
            <div class="face3"><img src="images/img3.jpg"></div>
            <div class="face4"><img src="images/img4.jpg"></div>
            <div class="face5"><img src="images/img5.jpg"></div>
            <div class="face6"><img src="images/img6.jpg"></div>
        </div>
    </div>

    <a href="index.html" class="back-link">← Quay lại Portfolio</a>

</body>
</html>

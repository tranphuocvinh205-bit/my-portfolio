<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đèn Kéo Quân - Giữa Kỳ</title>
    <style>
        .carousel-container { width: 400px; margin: 50px auto; overflow: hidden; border: 5px solid #333; position: relative; }
        .carousel-slide { display: flex; transition: transform 0.5s ease-in-out; }
        .carousel-slide img { width: 400px; height: 300px; object-fit: cover; }
    </style>
</head>
<body>
    <h2 style="text-align:center">Hiệu ứng Đèn Kéo Quân</h2>
    <div class="carousel-container" onmouseover="stop()" onmouseout="start()">
        <div class="carousel-slide" id="slide">
            <img src="images/img1.jpg">
            <img src="images/img2.jpg">
            <img src="images/img3.jpg">
            <img src="images/img4.jpg">
            <img src="images/img5.jpg">
            <img src="images/img6.jpg">
        </div>
    </div>
    <p style="text-align:center"><a href="index.html">Quay lại Portfolio</a></p>

    <script>
        let index = 0;
        let slide = document.getElementById("slide");
        let timer;

        function start() {
            timer = setInterval(() => {
                index = (index + 1) % 6;
                slide.style.transform = `translateX(${-index * 400}px)`;
            }, 2000); // Tốc độ quay: 2 giây
        }

        function stop() {
            clearInterval(timer);
        }

        start(); // Bắt đầu chạy khi load trang
    </script>
</body>
</html>

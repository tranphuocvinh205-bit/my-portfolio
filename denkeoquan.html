<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đèn kéo quân</title>

<style>
body{
    margin:0;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
    font-family:sans-serif;
}

/* khung 3D */
.scene{
    width:300px;
    height:300px;
    perspective:1000px;
}

.cube{
    width:100%;
    height:100%;
    position:relative;
    transform-style:preserve-3d;
    animation:spin 10s linear infinite;
}

.face{
    position:absolute;
    width:300px;
    height:300px;
}

.face img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* 6 mặt */
.front  { transform: rotateY(0deg) translateZ(150px); }
.back   { transform: rotateY(180deg) translateZ(150px); }
.right  { transform: rotateY(90deg) translateZ(150px); }
.left   { transform: rotateY(-90deg) translateZ(150px); }
.top    { transform: rotateX(90deg) translateZ(150px); }
.bottom { transform: rotateX(-90deg) translateZ(150px); }

@keyframes spin{
    from{ transform:rotateX(0deg) rotateY(0deg); }
    to{ transform:rotateX(360deg) rotateY(360deg); }
}
</style>
</head>

<body>

<div class="scene">
    <div class="cube" id="cube">
        <div class="face front"><img src="https://picsum.photos/300?1"></div>
        <div class="face back"><img src="https://picsum.photos/300?2"></div>
        <div class="face right"><img src="https://picsum.photos/300?3"></div>
        <div class="face left"><img src="https://picsum.photos/300?4"></div>
        <div class="face top"><img src="https://picsum.photos/300?5"></div>
        <div class="face bottom"><img src="https://picsum.photos/300?6"></div>
    </div>
</div>

<script>
const cube = document.getElementById("cube");

/* Hover = dừng */
cube.addEventListener("mouseenter",()=>{
    cube.style.animationPlayState="paused";
});

/* Rời chuột = quay tiếp */
cube.addEventListener("mouseleave",()=>{
    cube.style.animationPlayState="running";
});
</script>

</body>
</html>
